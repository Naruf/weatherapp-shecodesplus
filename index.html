<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>My weather application</title>
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="headerBlock">
        <form id="city-form">
          <input
            class="search-input"
            type="search"
            placeholder="Enter a city.."
            required
            id="city-input"
          />
          <input class="search-button" type="submit" value="Search" />
        </form>
      </header>
      <hr class="hr-header" />
      <main class="weather-info">
        <div class="current-weather">
          <div>
            <h1>Paris</h1>
            <p>
              <span id="timeStamp">Saturday 15:32</span>,
              <span id="description"> moderate rain </span> <br />
              Humidity: <span id="current-humidity"><strong>87%</strong></span
              >, Wind: <span id="current-wind"><strong>7.2km/h</strong></span>
            </p>
          </div>
          <div class="current-temperature">
            <span class="icon" id="weather-icon">☀️</span
            ><span id="current-temp">24</span><span class="degrees">°C</span>
          </div>
        </div>
      </main>
      <hr class="hr-footer" />
      <footer>
        <p>
          This project was coded by
          <a href="#" target="_blank">Nadia Ruiz</a> and is
          <a href="#" target="_blank"> on GitHub</a> and
          <a href="#" target="_blank">hosted on Netlify</a>
        </p>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
